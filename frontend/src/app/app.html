@if (authService.isAuthenticated()) {
  <mat-toolbar color="primary" class="app-toolbar">
    <mat-icon class="toolbar-logo">security</mat-icon>
    <span class="toolbar-title">CSPM Scanner</span>
    <span class="toolbar-spacer"></span>
    <nav class="toolbar-nav">
      <a mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon>search</mat-icon>
        <span>Scanner</span>
      </a>
      <a mat-button routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
    </nav>
    <span class="toolbar-spacer"></span>
    <span class="username">{{ authService.getUsername() }}</span>
    <button mat-icon-button (click)="logout()" aria-label="Logout">
      <mat-icon>logout</mat-icon>
    </button>
  </mat-toolbar>
}

<main class="app-content">
  <router-outlet></router-outlet>
</main>
