<mat-card class="finding-card" [ngClass]="getSeverityClass()"
  [attr.aria-label]="finding.severity + ' severity finding: ' + finding.title">
  <div class="card-header-row">
    <div class="severity-badge" [ngClass]="getSeverityClass()" [attr.aria-label]="finding.severity + ' severity'">
      <mat-icon>{{ getSeverityIcon() }}</mat-icon>
      <span>{{ finding.severity }}</span>
    </div>
    <div class="card-title-group">
      <h3 class="finding-title">{{ finding.title }}</h3>
      <div class="finding-meta-row">
        <span class="resource-type-badge">
          <mat-icon class="meta-icon">{{ getResourceIcon() }}</mat-icon>
          {{ finding.resourceType }}
        </span>
        <code class="resource-id">{{ finding.resourceId }}</code>
      </div>
    </div>
    <button
      mat-raised-button
      color="accent"
      (click)="autoRemediate()"
      [disabled]="isLoadingAutoRemediation()"
      [attr.aria-label]="'Auto-fix finding: ' + finding.title"
      class="auto-fix-btn"
    >
      @if (isLoadingAutoRemediation()) {
        <mat-spinner diameter="16" class="button-spinner"></mat-spinner>
        <span>Auto-fixing...</span>
      } @else {
        <mat-icon>smart_toy</mat-icon>
        <span>Auto-Fix</span>
      }
    </button>
    <button
      mat-stroked-button
      color="primary"
      (click)="getRemediation()"
      [disabled]="isLoadingRemediation()"
      [attr.aria-label]="'Get AI remediation for: ' + finding.title"
      class="remediation-btn"
    >
      @if (isLoadingRemediation()) {
        <mat-spinner diameter="16" class="button-spinner"></mat-spinner>
        <span>Analyzing...</span>
      } @else {
        <mat-icon>auto_fix_high</mat-icon>
        <span>Fix</span>
      }
    </button>
  </div>
  <div class="card-body">
    <p class="description">{{ finding.description }}</p>
  </div>
</mat-card>
